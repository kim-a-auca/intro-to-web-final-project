{% extends "base.html" %}

{% block title %}Create Quiz - Poll Quiz App{% endblock %}

{% block content %}
<section class="form-section">
    <h2>Create New Quiz</h2>
    
    <div class="form-container">
        <form id="quizForm">
            <div class="form-group">
                <label for="title">Quiz Title *</label>
                <input type="text" id="title" name="title" required placeholder="e.g., History 101 Quiz">
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Describe your quiz..."></textarea>
            </div>

            <div class="form-group">
                <label for="time_limit_minutes">Time Limit (minutes)</label>
                <input type="number" id="time_limit_minutes" name="time_limit_minutes" min="1" max="600" placeholder="Leave blank for no time limit">
                <small>Optional. Set how long users have to complete the quiz.</small>
            </div>

            <button type="submit" class="btn btn-primary btn-large">Create Quiz</button>
        </form>
    </div>
</section>

<script>
document.getElementById('quizForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const timeLimitRaw = document.getElementById('time_limit_minutes').value;
    const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        time_limit_minutes: timeLimitRaw ? parseInt(timeLimitRaw, 10) : null
    };
    
    try {
        const response = await fetch('/quiz/new', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
            window.location.href = `/quiz/${result.quiz_id}/edit`;
        }
    } catch (error) {
        alert('Error creating quiz: ' + error);
    }
});
</script>
{% endblock %}
