{% extends "base.html" %}

{% block title %}Submit Article - Poll Quiz App{% endblock %}

{% block content %}
<section class="form-section">
    <h2>Submit a Scientific Article</h2>
    <p class="text-muted">Share knowledge with the community. Your article will be visible to all users on the Articles page.</p>

    <div class="form-container">
        <form method="POST" action="{{ url_for('quiz.submit_article') }}">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required maxlength="300"
                       value="{{ form_data.title or '' }}" placeholder="e.g., An Introduction to CRISPR">
            </div>

            <div class="form-group">
                <label for="description">Short Description</label>
                <textarea id="description" name="description" rows="2"
                          placeholder="One- or two-sentence summary shown on cards.">{{ form_data.description or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" maxlength="100"
                       value="{{ form_data.category or '' }}" placeholder="e.g., Biology, Physics, Computer Science">
            </div>

            <div class="form-group">
                <label for="tags">Tags</label>
                <input type="text" id="tags" name="tags" maxlength="500"
                       value="{{ form_data.tags or '' }}" placeholder="comma,separated,tags">
            </div>

            <div class="form-group">
                <label for="thumbnail_url">Thumbnail URL</label>
                <input type="url" id="thumbnail_url" name="thumbnail_url" maxlength="500"
                       value="{{ form_data.thumbnail_url or '' }}" placeholder="https://example.com/cover.jpg">
            </div>

            <div class="form-group">
                <label for="read_time_minutes">Estimated Read Time (minutes)</label>
                <input type="number" id="read_time_minutes" name="read_time_minutes" min="1" max="600"
                       value="{{ form_data.read_time_minutes or 5 }}">
            </div>

            <div class="form-group">
                <label for="content">Article Content *</label>
                <textarea id="content" name="content" rows="14" required
                          placeholder="Paste or write the full article here. HTML and line breaks are preserved.">{{ form_data.content or '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-large">Publish Article</button>
            <a href="{{ url_for('quiz.articles_list') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
